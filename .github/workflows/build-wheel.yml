name: Build Wheel

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyblish-base PySide6

      - name: Smoke test demo reset
        run: python scripts/smoke_demo.py

      - name: Build wheel
        run: python scripts/build_wheel.py --outdir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyblish-qml-wheel
          path: dist/*.whl

  release-wheel:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: pyblish-qml-wheel
          path: dist

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
